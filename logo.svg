<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2b5876" />
            <stop offset="100%" stop-color="#4e4376" />
        </linearGradient>
        <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fdfbfb" />
            <stop offset="100%" stop-color="#ebedee" />
        </linearGradient>
    </defs>
    <!-- Background -->
    <rect width="512" height="512" rx="112" fill="url(#bg)"/>
    
    <!-- Outer Bulb Glow -->
    <path d="M256 100 C 150 100 110 180 110 250 C 110 320 180 350 200 390 L 312 390 C 332 350 402 320 402 250 C 402 180 362 100 256 100 Z" fill="url(#glow)" opacity="0.15"/>
    
    <!-- Bulb Glass -->
    <path d="M256 120 C 180 120 140 180 140 230 C 140 290 190 320 210 370 L 302 370 C 322 320 372 290 372 230 C 372 180 332 120 256 120 Z" fill="url(#glow)" opacity="0.9"/>
    
    <!-- Bulb Base -->
    <rect x="220" y="380" width="72" height="40" rx="10" fill="#ffffff" opacity="0.8"/>
    <rect x="226" y="390" width="60" height="8" rx="4" fill="#2b5876" opacity="0.5"/>
    <rect x="226" y="405" width="60" height="8" rx="4" fill="#2b5876" opacity="0.5"/>
    <path d="M230 430 L282 430 Q256 460 230 430 Z" fill="#ffffff" opacity="0.8"/>

    <!-- Dynamic/Smart Nodes Inside -->
    <!-- Center Node -->
    <circle cx="256" cy="250" r="22" fill="#2b5876"/>
    <!-- Left Node -->
    <circle cx="190" cy="200" r="14" fill="#ff758c"/>
    <!-- Right Node -->
    <circle cx="322" cy="200" r="14" fill="#ff7eb3"/>
    <!-- Bottom Node -->
    <circle cx="256" cy="320" r="12" fill="#ffd1ff"/>
    
    <!-- Connecting Lines -->
    <line x1="256" y1="250" x2="190" y2="200" stroke="#2b5876" stroke-width="6" stroke-linecap="round"/>
    <line x1="256" y1="250" x2="322" y2="200" stroke="#2b5876" stroke-width="6" stroke-linecap="round"/>
    <line x1="256" y1="250" x2="256" y2="320" stroke="#2b5876" stroke-width="6" stroke-linecap="round"/>
    <line x1="190" y1="200" x2="256" y2="160" stroke="#ff758c" stroke-width="4" stroke-dasharray="8 4" stroke-linecap="round" opacity="0.6"/>
    <line x1="322" y1="200" x2="256" y2="160" stroke="#ff7eb3" stroke-width="4" stroke-dasharray="8 4" stroke-linecap="round" opacity="0.6"/>
</svg>
